services:
  sentinel-hub:
    build: .
    container_name: sentinel-hub
    restart: always
    network_mode: "host"
    volumes:
      - sentinel-db:/app/prisma
      - ./data/recordings:/app/public/recordings
      - ./data/thumbnails:/app/public/thumbnails
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/3000 && echo -e \"GET /api/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q \"200 OK\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sentinel-db:
