version: "3.8"

services:
  sentinel-hub:
    build: .
    container_name: sentinel-hub
    restart: always
    network_mode: "host"
    volumes:
      - sentinel-db:/app/prisma
      - ./data/recordings:/app/public/recordings
      - ./data/thumbnails:/app/public/thumbnails
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - AUTH_TRUST_HOST=true
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sentinel-db:
